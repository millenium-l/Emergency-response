<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->   
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <title>Register - Emergency Response System</title>
</head>
<body>

    {% load crispy_forms_tags %}
 {% load static %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">

<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-7">
        <div class="card reg-card">
            <div class="card-header reg-header text-white text-center">
                <h4 class="mb-0 fw-semibold">Emergency Response Registration</h4>
            </div>
            
            <div class="card-body p-4">
                {% if error or form.errors %}
                    <div class="alert alert-danger small">
                        {{ error }} {{ form.errors }}
                    </div>
                {% endif %}

                {# Notice: No <form> tag here! The {% crispy %} tag generates it for you. #}
                {% crispy form %}

                <div class="mt-4 pt-3 border-top text-center">
                    <p class="text-muted small">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--accent-blue);">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
