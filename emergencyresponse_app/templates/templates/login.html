{% load static %} <link rel="stylesheet" href="{% static 'css/login.css' %}">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    

    <title>Login</title>
</head>

<body>

<div class="login-card ">
    <div class="login-header text-white text-center">
        <h5 class="mb-1 fw-bold">
            <i class="fas fa-shield-alt me-2"></i>Secure Login
        </h5>
        <p class="mb-0 small opacity-75">Access the Response Network</p>
    </div>

    <div class="p-4">
        {% if error %}
        <div class="alert alert-danger small py-2">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user text-muted"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="username" name="username" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label">Password</label>
                    <a href="#" class="small text-decoration-none text-primary">Forgot?</a>
                </div>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input type="password" class="form-control border-end-0" id="password_field" placeholder="**********" name="password" required>

                    <span class="input-group-text bg-remote border-start-0 password-toggle"
                          onclick="togglePassword('password_field')">
                        <i class="fas fa-eye text-muted" id="toggleIcon_password_field"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                SIGN IN
            </button>
        </form>

        <div class="text-center pt-3 border-top">
            <small class="text-muted">
                Don't have an account?
                <a href="{% url 'register' %}" class="fw-bold text-decoration-none">Register</a>
            </small>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById('toggleIcon_' + inputId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
